<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>

  <!-- Shield logo -->
  <g transform="translate(600, 220)">
    <path d="M0,-80 L50,-60 L50,10 C50,50 25,75 0,90 C-25,75 -50,50 -50,10 L-50,-60 Z"
          fill="none" stroke="url(#accent)" stroke-width="4"/>
    <path d="M0,-55 L30,-40 L30,5 C30,35 15,52 0,62 C-15,52 -30,35 -30,5 L-30,-40 Z"
          fill="url(#accent)" opacity="0.15"/>
    <!-- Eye / sentinel symbol -->
    <ellipse cx="0" cy="-5" rx="18" ry="12" fill="none" stroke="#818cf8" stroke-width="2.5"/>
    <circle cx="0" cy="-5" r="6" fill="#6366f1"/>
    <circle cx="0" cy="-5" r="2.5" fill="#c7d2fe"/>
  </g>

  <!-- Title -->
  <text x="600" y="350" text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="56" fill="#f8fafc"
        letter-spacing="-1">OpenSentinel</text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-weight="500" font-size="24" fill="#94a3b8"
        letter-spacing="0.5">The AI Agent Operating System</text>

  <!-- Accent line -->
  <rect x="500" y="420" width="200" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#6366f1" opacity="0.3"/>
</svg>
