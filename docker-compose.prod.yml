# OpenSentinel Production Docker Compose
# Hardened configuration with TLS, resource limits, non-root, and log rotation.
#
# Usage:
#   cp .env.example .env && edit .env
#   mkdir -p docker/ssl && # add fullchain.pem + privkey.pem
#   docker compose -f docker-compose.prod.yml up -d
#
# TLS / Let's Encrypt:
#   # Install certbot on the host (not inside Docker):
#   sudo apt install certbot
#   sudo certbot certonly --standalone -d your-domain.com
#   # Copy certs into the docker/ssl directory:
#   cp /etc/letsencrypt/live/your-domain.com/fullchain.pem docker/ssl/
#   cp /etc/letsencrypt/live/your-domain.com/privkey.pem docker/ssl/
#   # Renewal cron (runs twice daily):
#   echo "0 */12 * * * certbot renew --quiet && cp /etc/letsencrypt/live/your-domain.com/*.pem /path/to/OpenSentinel/docker/ssl/ && docker compose -f docker-compose.prod.yml restart nginx" | sudo tee /etc/cron.d/certbot-renew

services:
  # ──────────────────────────────────────────────
  # Main OpenSentinel application
  # ──────────────────────────────────────────────
  opensentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opensentinel
    restart: always
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:size=100M
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8030
      - DATABASE_URL=postgresql://opensentinel:${DB_PASSWORD:-opensentinel}@postgres:5432/opensentinel
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_ALLOWED_USER_IDS=${DISCORD_ALLOWED_USER_IDS}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - HUGGINGFACE_ACCESS_TOKEN=${HUGGINGFACE_ACCESS_TOKEN}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - STRIPE_KEY=${STRIPE_KEY}
      - STRIPE_SECRET=${STRIPE_SECRET}
      - STRIPE_API_KEY_ID=${STRIPE_API_KEY_ID}
      # Multi-Model LLM Providers
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - OPENAI_LLM_ENABLED=${OPENAI_LLM_ENABLED:-false}
      - XAI_API_KEY=${XAI_API_KEY}
      - XAI_DEFAULT_MODEL=${XAI_DEFAULT_MODEL:-grok-2}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_DEFAULT_MODEL=${GEMINI_DEFAULT_MODEL:-gemini-2.0-flash}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_DEFAULT_MODEL:-llama3.1}
      # Slack
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      # Smart Home & Integrations
      - HOME_ASSISTANT_URL=${HOME_ASSISTANT_URL}
      - HOME_ASSISTANT_TOKEN=${HOME_ASSISTANT_TOKEN}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - SPOTIFY_REFRESH_TOKEN=${SPOTIFY_REFRESH_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_ROOT_PAGE_ID=${NOTION_ROOT_PAGE_ID}
      # Security
      - GATEWAY_TOKEN=${GATEWAY_TOKEN}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
      - AUDIT_SIGNING_KEY=${AUDIT_SIGNING_KEY}
    ports:
      - "8030:8030"
    volumes:
      - opensentinel_data:/app/data
      - opensentinel_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opensentinel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ──────────────────────────────────────────────
  # PostgreSQL with pgvector
  # ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opensentinel-postgres
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_USER=opensentinel
      - POSTGRES_PASSWORD=${DB_PASSWORD:-opensentinel}
      - POSTGRES_DB=opensentinel
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5445:5432"
    networks:
      - opensentinel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensentinel -d opensentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Redis for caching and job queues
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opensentinel-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6385:6379"
    networks:
      - opensentinel-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ──────────────────────────────────────────────
  # Nginx reverse proxy with TLS
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: opensentinel-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - opensentinel
    networks:
      - opensentinel-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  opensentinel-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  opensentinel_data:
    driver: local
  opensentinel_logs:
    driver: local
